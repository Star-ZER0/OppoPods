name: Build OppoPods v7-Final

on:
  push:
    tags: [ "v*" ]
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      # 编译 APK
      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      # 签名逻辑
      - name: Sign release APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        if: ${{ env.SIGNING_KEY != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/keystore.jks
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name '*-unsigned.apk' | head -1)
          
          # 统一输出到当前目录，消除深层路径干扰
          ${BUILD_TOOLS}zipalign -f 4 "$UNSIGNED_APK" ./release.apk
          
          ${BUILD_TOOLS}apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            ./release.apk
          rm /tmp/keystore.jks

      - name: Prepare Debug APK
        run: |
          DEBUG_RAW=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          cp "$DEBUG_RAW" ./debug.apk

      # =======================================================
      # 重点：严格使用 v7 版本并开启 archive: false
      # =======================================================
      
      - name: Upload Release APK (Unzipped)
        uses: actions/upload-artifact@v7
        with:
          name: release.apk   # 明确带后缀的名字
          path: ./release.apk
          archive: false      # 核心：2026新特性，禁止打包成zip

      - name: Upload Debug APK (Unzipped)
        uses: actions/upload-artifact@v7
        with:
          name: debug.apk
          path: ./debug.apk
          archive: false

      # =======================================================

      - name: Create GitHub Release
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.SIGNING_KEY != '' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ github.token }}
          # 多个文件用逗号隔开
          artifacts: "./release.apk,./debug.apk"
          generateReleaseNotes: true
          makeLatest: true
